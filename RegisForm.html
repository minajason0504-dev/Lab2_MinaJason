<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <title>Registration Form</title>
    <link rel="stylesheet" type="text/css" href="RegisForm.css">
  </head>

  <body>

    <center>
      <h2>Registration Form</h2>

      <form action="MainPage.html" method="post">

        <div>
          <label>Enter your Name:</label>
          <input type="text" name="name" placeholder="Enter your full name" required>
        </div>
        <br>

        <div>
          <label>Institutional Email:</label>
          <input type="email" name="email" placeholder="Enter your email here" required>
        </div>
        <br>

        <div>
          <label>Password:</label>
          <input type="password" name="password" placeholder="Enter your password here" required>
        </div>
        <br>

        <div>
          <label>Date of Birth:</label>
          <input type="date" name="dob">
        </div>
        <br>

        <div>
          <label>Course:</label>
          <input type="text" name="course" placeholder="Your course here" required>
        </div>
        <br>

        <div>
          <label>Year:</label>
          <input type="number" name="year" min="0" max="4">
        </div>
        <br>

        <div>
          <label>Section:</label>
          <input type="text" name="section" placeholder="Put your section here" required>
        </div>
        <br>

        <button type="submit">Submit</button>

      </form>

      <footer>
        <p>&copy; 2026 GROUP 6 BSIT-1B All rights reserved.</p>
      </footer>

    </center>

  </body>
</html>
